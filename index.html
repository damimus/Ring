<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RING App</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.app {
    width: 100%;
    max-width: 500px;
    background: white;
    border-radius: 25px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.phone {
    font-size: clamp(40px, 8vw, 60px);
    margin-bottom: 10px;
}

h1 {
    font-size: clamp(20px, 5vw, 28px);
    margin-bottom: 15px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
}

button {
    width: 100%;
    aspect-ratio: 1 / 1;
    font-size: clamp(16px, 5vw, 24px);
    border: none;
    border-radius: 18px;
    color: white;
    cursor: pointer;
}

button:active {
    transform: scale(0.9);
}

/* 🎨 COLORES */
.do, .do8 { background: #e74c3c; }
.re { background: #00bcd4; }
.mi { background: #2ecc71; }
.fa { background: #9b59b6; }
.sol { background: #f1c40f; color: black; }
.la { background: #ff6fa5; }
.sib { background: #7f8c8d; }

/* 🔘 BOTÓN */
.init-btn {
    width: 33%;
    min-width: 120px;
    margin: 0 auto 10px auto;
    display: block;
    padding: 10px;
    border-radius: 12px;
    background: #333;
    color: white;
    font-size: 14px;
}

/* 📊 BARRA PROGRESO */
.progress-container {
    width: 80%;
    height: 10px;
    background: #ddd;
    border-radius: 10px;
    margin: 10px auto;
    overflow: hidden;
    display: none;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #4facfe;
    transition: width 0.2s;
}

.progress-text {
    font-size: 12px;
    margin-top: 5px;
    display: none;
}

/* PC */
@media (min-width: 900px) {
    .grid {
        grid-template-columns: repeat(8, 1fr);
    }
}
</style>
</head>

<body>

<div class="app">
    <div class="phone">📞</div>
    <h1>RING</h1>

    <button id="initBtn" class="init-btn" onclick="initAudio()">Cargar sonidos</button>

    <!-- Barra progreso -->
    <div id="progressContainer" class="progress-container">
        <div id="progressBar" class="progress-bar"></div>
    </div>
    <div id="progressText" class="progress-text">0%</div>

    <div class="grid">
        <button class="do" onclick="play('do')">DO</button>
        <button class="re" onclick="play('re')">RE</button>
        <button class="mi" onclick="play('mi')">MI</button>
        <button class="fa" onclick="play('fa')">FA</button>
        <button class="sol" onclick="play('sol')">SOL</button>
        <button class="la" onclick="play('la')">LA</button>
        <button class="sib" onclick="play('sib')">SI♭</button>
        <button class="do8" onclick="play('do8')">DO'</button>
    </div>
</div>

<script>
let audioContext;
let buffers = {};
let loaded = false;

async function initAudio() {
    if (loaded) return;

    const button = document.getElementById("initBtn");
    const bar = document.getElementById("progressBar");
    const container = document.getElementById("progressContainer");
    const text = document.getElementById("progressText");

    button.style.display = "none";
    container.style.display = "block";
    text.style.display = "block";

    audioContext = new (window.AudioContext || window.webkitAudioContext)();

    const notes = ["do", "re", "mi", "fa", "sol", "la", "sib", "do8"];
    let loadedCount = 0;

    for (let note of notes) {
        const response = await fetch("sounds/" + note + ".mp3");
        const arrayBuffer = await response.arrayBuffer();
        buffers[note] = await audioContext.decodeAudioData(arrayBuffer);

        loadedCount++;

        let progress = Math.floor((loadedCount / notes.length) * 100);
        bar.style.width = progress + "%";
        text.innerText = progress + "%";
    }

    loaded = true;

    text.innerText = "✔ Listo";

    setTimeout(() => {
        container.style.display = "none";
        text.style.display = "none";
    }, 800);
}

function play(note) {
    if (!loaded) return;

    const source = audioContext.createBufferSource();
    source.buffer = buffers[note];
    source.connect(audioContext.destination);
    source.start(0);
}
</script>

</body>
</html>
